name: 🐛 Bug Report
description: Report a bug to help us improve BoardTAU.
title: "[BUG]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ### Thank you for reporting! 🚀
        Please provide as much information as possible to help us reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue here...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the exact steps needed to recreate the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Environment & Context
      description: Browser, OS version, or any relevant environment details.
      placeholder: e.g. Chrome 120 on Windows 11...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add any screenshots or recordings of the issue.
