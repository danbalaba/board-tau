name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 New Features'
    labels:
      - 'enhancement'
      - 'feat'
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🏠 Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'docs'
change-template: '- $TITLE (@$AUTHOR)'
template: |
  ## What's Changed
  $CHANGES
